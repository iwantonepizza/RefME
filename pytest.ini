[pytest]
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-config=pytest.ini
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    e2e: End-to-end tests with PostgreSQL

# Coverage настройки
[coverage:run]
source = .
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */.venv/*
    */migrations/*
    */alembic/*
    run_migrations.py
    */prometheus/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

[coverage:html]
directory = htmlcov
