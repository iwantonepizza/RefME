services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: llm_gate_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:17
    container_name: llm_gate_db
    restart: always
    command: postgres -c log_min_duration_statement=1000
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-super_pass}
      POSTGRES_DB: ${POSTGRES_DB:-llm_gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llm_user} -d ${POSTGRES_DB:-llm_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
